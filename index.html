<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Project: Library</title>
</head>
<body>


    <dialog id="addBook">
        <h2>Add a Book</h2>
            <form id="questionForm" name="questionForm" 
            method="post">
                <p>
                <legend>What book would you like to add?</legend>
                    <label for="bookTitle">Title</label>
                        <br>

                    <input type="text" id="bookTitle" name="bookTitle" 
                    value="" placeholder="Book Title">
                        <br>

                    <label for="bookAuthor">Author</label>
                        <br>

                    <input type="text" id="bookAuthor" name="bookAuthor" 
                    value="" placeholder="Book Author">
                        <br>

                    <label for="pageLength">Page Length:</label>
                        <br>

                    <input type="number" name=pageNum id="pageLength" 
                    step="1" min="1" 
                    max="20000" value="" placeholder="1">
                        <br>

                    <input type="checkbox" id="read" name="read"/>
                    <label for="read">I've read this</label>
                        <br>

                    <button type="reset" id="resetForm">Reset</button>
                </p>

                <div>
                    <button type="submit" id="submitBook" value="submitBook">
                        Submit</button>

                    <button type="cancel" id="cancel" value="cancel" 
                    formmethod="dialog">Cancel</button>
                </div>
            </form>
    </dialog>
        <div id="header">
            <div id="pageTitle">
                <h1>Your Library</h1>
            </div>
            <div id="newButton">
                <button autofocus class="addBook" onclick="addBookToLibrary()"
                >Add New Book</button>
            </div>
        </div>
            <div id="libraryDisplay">
            </div>
        </div>
</body>
</html>
